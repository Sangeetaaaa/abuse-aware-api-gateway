<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Style Thoughts</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Lobster&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #fafafa;
  --white: #ffffff;
  --border: #dbdbdb;
  --text-main: #262626;
  --text-muted: #8e8e8e;
  --link: #0095f6;
  --insta-grad: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
  --error: #ed4956;
}

body {
  background: var(--bg);
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  margin: 0;
  padding-top: 60px;
}

/* ── Header ── */
header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  height: 60px;
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

header h1 {
  font-family: 'Lobster', cursive;
  font-size: 24px;
  font-weight: 400;
  margin: 0;
}

.container {
  max-width: 470px;
  margin: 0 auto;
  padding: 20px 0;
}

/* ── Stories Bar ── */
.stories-bar {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  gap: 15px;
  overflow-x: auto;
}

.story-circle {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--insta-grad);
  padding: 2px;
  flex-shrink: 0;
}

.story-circle img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 2px solid white;
  background: #eee;
  object-fit: cover;
}

/* ── Create Post ── */
.create-post {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 24px;
}

.input-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.avatar-small {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #eee;
}

.input-field {
  border: none;
  outline: none;
  font-size: 14px;
  flex: 1;
}

/* ── Post Cards ── */
.post-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 12px;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.post-header {
  padding: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.username {
  font-weight: 600;
  font-size: 14px;
}

.post-body {
  padding: 0 12px 12px;
  font-size: 14px;
  line-height: 1.5;
}

.post-actions {
  padding: 8px 12px;
  display: flex;
  gap: 16px;
}

.action-icon {
  cursor: pointer;
  font-size: 22px;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #333;
  color: white;
  padding: 12px 24px;
  border-radius: 4px;
  font-size: 14px;
  transition: transform 0.3s ease;
  z-index: 1000;
}

.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--error); }

.stories-bar::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<header>
  <h1>Thoughts</h1>
</header>

<div class="container">
  <div class="stories-bar">
    <div class="story-circle"><img src="https://api.dicebear.com/7.x/notionists/svg?seed=SRK"></div>
    <div class="story-circle"><img src="https://api.dicebear.com/7.x/notionists/svg?seed=Ranbir"></div>
    <div class="story-circle"><img src="https://api.dicebear.com/7.x/notionists/svg?seed=Alia"></div>
    <div class="story-circle"><img src="https://api.dicebear.com/7.x/notionists/svg?seed=Varun"></div>
    <div class="story-circle"><img src="https://api.dicebear.com/7.x/notionists/svg?seed=Kiara"></div>
  </div>

  <div class="create-post">
    <div class="input-row">
      <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Sangeeta" class="avatar-small">
      <input type="text" id="thought-input" class="input-field" placeholder="What's on your mind? (Enter to post)" autocomplete="off">
    </div>
  </div>

  <div id="post-list"></div>
</div>

<div id="toast" class="toast"></div>

<script>
let thoughts = [];
const inputField = document.getElementById("thought-input");

function showToast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = isError ? "toast error show" : "toast show";
  setTimeout(() => t.classList.remove("show"), 10000);
}

// Fetch from Go Backend
async function fetchThoughts() {
  try {
    const res = await fetch("/todos");
    if (res.status === 429) return showToast("Slow down! Too many requests.", true);
    if (res.status === 403) return showToast("IP Blocked for 1 minute!", true);
    if (!res.ok) throw new Error();
    
    thoughts = await res.json();
    render();
  } catch (e) {
    showToast("Server unreachable", true);
  }
}

// Add via Go Backend
async function addThought() {
  const text = inputField.value.trim();
  if (!text) return;

  try {
    const res = await fetch("/add", {
      method: "PUT",
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: text, completed: false })
    });

    if (res.status === 429) return showToast("Rate limit exceeded!", true);
    if (res.status === 403) return showToast("You are blocked!", true);
    if (!res.ok) throw new Error();

    const data = await res.json();
    thoughts = data.todo; // Backend returns the updated list in .todo
    inputField.value = "";
    render();
    showToast("Post shared!");
  } catch (e) {
    showToast("Failed to share post", true);
  }
}

function render() {
  const list = document.getElementById("post-list");
  if (thoughts.length === 0) {
    list.innerHTML = `<p style="text-align:center; color:gray; font-size:14px; margin-top:20px;">No posts yet.</p>`;
    return;
  }

  list.innerHTML = thoughts.map((t, i) => `
    <div class="post-card">
      <div class="post-header">
        <div class="story-circle" style="width:24px; height:24px; padding:1.5px;">
           <img src="https://api.dicebear.com/7.x/notionists/svg?seed=${i}">
        </div>
        <span class="username">anonymous_user_${i}</span>
      </div>
      <div class="post-body">
        ${escapeHtml(t.title)}
      </div>
      <div class="post-actions">
        <span class="action-icon">♡</span>
        <span class="action-icon">💬</span>
        <span class="action-icon">✈️</span>
      </div>
    </div>
  `).reverse().join(""); // .reverse() so newest is on top
}

function escapeHtml(str) {
  if(!str) return "";
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

inputField.addEventListener("keydown", e => {
  if (e.key === "Enter") addThought();
});

// Initial load
fetchThoughts();
</script>

</body>
</html>
